name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Firebase
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Guard — ensure we never deploy rules from this repo
        run: |
          if grep -q '"firestore"' firebase.json; then
            echo "::error::firebase.json contains firestore config — rules must only be deployed from BrandaptOS"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check FIREBASE_SERVICE_ACCOUNT_BRANDAPTOS_V2 exists
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BRANDAPTOS_V2 }}" ]; then
            echo "::error::Missing required secret FIREBASE_SERVICE_ACCOUNT_BRANDAPTOS_V2."
            echo "::error::Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Value = the brandaptos-v2 service-account JSON (same one BrandaptOS/Pamhepo CI use)."
            exit 1
          fi

      # Service-account auth — matches the rest of the ecosystem.
      # w9jds/firebase-action + FIREBASE_TOKEN was abandoned (see BrandaptOS STATUS decision log 2026-04-18).
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BRANDAPTOS_V2 }}
          export_environment_variables: true
          create_credentials_file: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy to Firebase Hosting (nfc)
        run: firebase deploy --only hosting:nfc --project brandaptos-v2 --non-interactive
